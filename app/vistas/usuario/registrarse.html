<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="publico/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384 img-fluid-sRIl4 img-fluidkxILFvY4 img-fluid7J16cr9ZwB07vP4 img-fluidJ8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="publico/css/inicio.css">
    <title>Servindustria TR</title>
</head>
<body>
  <section class="register-section">
    <div class="register-image">
      <img src="publico/img/presentacion_registro.jpg" alt="Proyecto eléctrico profesional" loading="lazy">
    </div>
    <div class="form-pane">
      <div class="form-card">
        <div class="hero-badge">Registro</div>
        <form action="registro" method="post">
          <div class="mb-4">
            <label class="form-label" for="email">Correo electrónico</label>
            <input id="email" class="form-control" type="email" name="correo" placeholder="ejemplo@correo.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Contraseña</label>
            <input id="password" class="form-control" type="password" name="contraseña" placeholder="Ingresa tu contraseña" minlength="8" required>
            <div class="helper-text">8 caracteres mínimos</div>
          </div>
          <button class="btn btn-register" type="submit">Siguiente</button>
        </form>
      </div>
    </div>
  </section>
</body>
</html>
