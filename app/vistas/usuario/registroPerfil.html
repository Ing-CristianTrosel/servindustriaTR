<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="publico/css/inicio.css">
</head>
<body>
  <section class="register-section">
    <div class="register-image">
      <img src="publico/img/imagen-fondo.jpg" alt="Proyecto eléctrico profesional" loading="lazy">
    </div>
    <div class="form-pane">
      <div class="form-card">
        <div class="hero-badge">Registro</div>
        <form action="registro_perfil" method="post">
          <div class="mb-4">
            <label class="form-label" for="email">Primer Nombre</label>
            <input id="email" class="form-control" type="text" name="nombre1" placeholder="Ingresa Aqui" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Segundo Nombre</label>
            <input id="password" class="form-control" type="text" name="nombre2" placeholder="Ingresa Aqui" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Primer Apellido</label>
            <input id="password" class="form-control" type="text" name="apellido1" placeholder="Ingresa Aqui" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Segundo Apellido</label>
            <input id="password" class="form-control" type="text" name="apellido2" placeholder="Ingresa Aqui" required>
          </div>
          <button class="btn btn-register" type="submit">Siguiente</button>
        </form>
      </div>
    </div>
  </section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
